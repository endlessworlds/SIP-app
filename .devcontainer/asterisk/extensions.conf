[phones]
exten => 1001,1,Dial(PJSIP/1001,20)
 same => n,Hangup()

exten => 1002,1,Dial(PJSIP/1002,20)
 same => n,Hangup()

exten => _X.,1,Dial(PJSIP/${EXTEN},20)
 same => n,Hangup()

[sip-sim]
exten => 9100,1,NoOp(SIP simulation caller leg)
 same => n,System(echo "CALL_INITIATION|leg=caller" >> /tmp/sip_simulation_events.log)
 same => n,System(echo "PROGRESS|leg=caller" >> /tmp/sip_simulation_events.log)
 same => n,System(echo "ACCEPTED|leg=caller" >> /tmp/sip_simulation_events.log)
 same => n,System(echo "CONFIRMED|leg=caller" >> /tmp/sip_simulation_events.log)
 same => n,System(echo "ENDED|leg=caller" >> /tmp/sip_simulation_events.log)
 same => n,Hangup()

exten => 9101,1,NoOp(SIP simulation callee leg)
 same => n,System(echo "PROGRESS|leg=callee" >> /tmp/sip_simulation_events.log)
 same => n,System(echo "ACCEPTED|leg=callee" >> /tmp/sip_simulation_events.log)
 same => n,System(echo "CONFIRMED|leg=callee" >> /tmp/sip_simulation_events.log)
 same => n,System(echo "ENDED|leg=callee" >> /tmp/sip_simulation_events.log)
 same => n,Hangup()

exten => 9200,1,NoOp(SIP simulation busy scenario)
 same => n,System(echo "CALL_INITIATION|scenario=busy" >> /tmp/sip_simulation_events.log)
 same => n,System(echo "PROGRESS|scenario=busy" >> /tmp/sip_simulation_events.log)
 same => n,System(echo "FAILED|scenario=busy" >> /tmp/sip_simulation_events.log)
 same => n,System(echo "ENDED|scenario=busy" >> /tmp/sip_simulation_events.log)
 same => n,Busy(2)

exten => 9201,1,NoOp(SIP simulation no-answer scenario)
 same => n,System(echo "CALL_INITIATION|scenario=no_answer" >> /tmp/sip_simulation_events.log)
 same => n,System(echo "PROGRESS|scenario=no_answer" >> /tmp/sip_simulation_events.log)
 same => n,System(echo "FAILED|scenario=no_answer" >> /tmp/sip_simulation_events.log)
 same => n,System(echo "ENDED|scenario=no_answer" >> /tmp/sip_simulation_events.log)
 same => n,Wait(10)
 same => n,Hangup()

exten => 9202,1,NoOp(SIP simulation registration failure scenario)
 same => n,System(echo "REGISTRATION_ATTEMPT|scenario=registration_fail" >> /tmp/sip_simulation_events.log)
 same => n,System(echo "REGISTRATION_FAILED|scenario=registration_fail" >> /tmp/sip_simulation_events.log)
 same => n,Hangup()
